services:
  # PostgreSQL Database
  - type: pserv
    name: kindred-db
    plan: free
    region: oregon
    databaseName: kindred_production
    databaseUser: kindred

  # Rails API Web Service
  - type: web
    name: kindred-api
    env: ruby
    region: oregon
    plan: free
    buildCommand: bundle install && rails db:migrate
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        value: 4f44675bbeb3557fc25102bc1f1aff62
      - key: DATABASE_URL
        fromDatabase:
          name: kindred-db
          property: connectionString
